name: Publish
on:
  workflow_dispatch:
    inputs:
      version:
        description: "image tag + AGENTIC_VERSION (powabase-agentic), e.g. 0.1.0rc1"
        required: true
        type: string
      dry_run:
        description: "Build only; push nothing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write        # ghcr image push via GITHUB_TOKEN

env:
  IMAGE: ghcr.io/powabase-ai/powabase-ai

jobs:
  publish:
    name: powabase-ai → ghcr (amd64+arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (+push on real run)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            AGENTIC_VERSION=${{ inputs.version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.dry_run == false }}
          tags: ${{ env.IMAGE }}:${{ inputs.version }}
